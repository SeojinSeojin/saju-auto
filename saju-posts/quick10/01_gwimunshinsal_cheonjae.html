<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>귀문관살 있는 사람이 천재인 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(155deg,#0d0520 0%,#1a0533 55%,#0a0b2e 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.14;}50%{opacity:.88;}}
@keyframes shimmer{0%,100%{opacity:.08;transform:scale(1);}50%{opacity:.2;transform:scale(1.05);}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite 1.2s;}
.header{position:relative;z-index:2;margin-bottom:4px;}
.tag{display:inline-block;background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.4);color:#c084fc;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;}
.title{font-family:'Black Han Sans',sans-serif;font-size:21px;line-height:1.38;color:#fff;text-shadow:0 0 28px rgba(168,85,247,.85);}
.title em{color:#e879f9;font-style:normal;}
.items{flex:1;display:flex;flex-direction:column;gap:7px;position:relative;z-index:2;}
.item{display:flex;align-items:flex-start;gap:10px;background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.16);border-radius:10px;padding:8px 12px;box-shadow:0 0 16px rgba(168,85,247,.09);}
.num{font-family:'Black Han Sans',sans-serif;font-size:17px;color:#a855f7;min-width:26px;line-height:1.15;text-shadow:0 0 10px rgba(168,85,247,.9);}
.tx{display:flex;flex-direction:column;gap:2px;}
.it{font-size:12.5px;font-weight:700;color:#ede9fe;line-height:1.3;}
.id{font-size:10.5px;color:rgba(216,180,254,.58);line-height:1.42;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="42" cy="88" r="1.5" fill="#fff" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="118" cy="44" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="278" cy="115" r="2" fill="#e879f9" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="318" cy="78" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="28" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="198" r="1" fill="#c084fc" style="--d:2.1s;--delay:1.2s;"/>
  <circle class="star" cx="330" cy="300" r="1.5" fill="#fff" style="--d:2.8s;--delay:.6s;"/>
  <circle class="star" cx="22" cy="322" r="1" fill="#e879f9" style="--d:3.2s;--delay:.2s;"/>
  <circle class="star" cx="148" cy="12" r="1" fill="#fff" style="--d:2.6s;--delay:1.5s;"/>
  <circle class="star" cx="88" cy="540" r="1" fill="#c084fc" style="--d:2.4s;--delay:.9s;"/>
  <!-- Crescent moon top-right -->
  <path class="moon" d="M320 25 Q344 14 338 46 Q332 68 314 57 Q330 42 320 25Z" fill="rgba(232,121,249,.28)"/>
  <!-- Eye / mystical orb decoration bottom-right -->
  <g class="deco" transform="translate(262,462)" opacity=".14">
    <ellipse cx="28" cy="20" rx="26" ry="15" stroke="#a855f7" stroke-width="2" fill="none"/>
    <circle cx="28" cy="20" r="8" stroke="#a855f7" stroke-width="1.5" fill="rgba(168,85,247,.14)"/>
    <circle cx="28" cy="20" r="3.5" fill="rgba(232,121,249,.45)"/>
    <line x1="2" y1="20" x2="54" y2="20" stroke="#a855f7" stroke-width=".8" opacity=".35"/>
    <!-- eyelash lines -->
    <line x1="14" y1="6" x2="16" y2="10" stroke="#a855f7" stroke-width="1" opacity=".5"/>
    <line x1="28" y1="4" x2="28" y2="8" stroke="#a855f7" stroke-width="1" opacity=".5"/>
    <line x1="42" y1="6" x2="40" y2="10" stroke="#a855f7" stroke-width="1" opacity=".5"/>
  </g>
  <ellipse class="deco" cx="180" cy="340" rx="200" ry="162" fill="rgba(124,58,237,.04)"/>
</svg>

<div class="header">
  <div class="tag">神煞 · 신살</div>
  <div class="title">머리가 좋은 게 아니라<br><em>귀문관살</em>이다</div>
</div>

<div class="items">
  <div class="item">
    <span class="num">01</span>
    <div class="tx"><span class="it">보이지 않는 패턴을 무의식으로 읽음</span><span class="id">설명은 못 하는데 결론은 이미 알고 있음</span></div>
  </div>
  <div class="item">
    <span class="num">02</span>
    <div class="tx"><span class="it">낮보다 밤에 뇌가 풀가동됨</span><span class="id">밤 12시에 아이디어 터지는 건 우연이 아님</span></div>
  </div>
  <div class="item">
    <span class="num">03</span>
    <div class="tx"><span class="it">한 가지에 꽂히면 전부 파고듦</span><span class="id">집착처럼 보이지만 그게 천재성의 본체</span></div>
  </div>
  <div class="item">
    <span class="num">04</span>
    <div class="tx"><span class="it">꿈이 선명하고 현실에 맞아 떨어짐</span><span class="id">꿈 얘기 하면 아무도 안 믿어줌 ㅠ</span></div>
  </div>
  <div class="item">
    <span class="num">05</span>
    <div class="tx"><span class="it">예민함 자체가 레이더</span><span class="id">남들보다 더 많이 느끼니까 더 많이 캐치함</span></div>
  </div>
  <div class="item">
    <span class="num">06</span>
    <div class="tx"><span class="it">예술·직관 분야에서 논리 없이 정답을 냄</span><span class="id">감각으로 답을 꺼내는 사람</span></div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

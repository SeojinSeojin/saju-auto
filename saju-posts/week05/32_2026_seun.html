<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올해 세운으로 보는 2026년 주의해야 할 것들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#020c1c 0%,#091828 55%,#010a18 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:20px;}
.tag{display:inline-block;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:34px;line-height:1.2;color:#fff;text-shadow:0 0 35px rgba(59,130,246,.7),0 0 65px rgba(59,130,246,.25);}
.big-text em{color:#60a5fa;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:12px;}
.phrase-block{border-left:3px solid rgba(59,130,246,.5);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:15px;color:#dbeafe;line-height:1.35;text-shadow:0 0 10px rgba(59,130,246,.4);}
.phrase-sub{font-size:11px;color:rgba(147,197,253,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="90" r="1.5" fill="#93c5fd" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="112" cy="46" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="284" cy="116" r="2" fill="#93c5fd" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="318" cy="78" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="194" cy="30" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="56" cy="194" r="1" fill="#93c5fd" style="--d:2.1s;--delay:1.3s;"/>
  <circle class="star" cx="326" cy="308" r="1.5" fill="#fff" style="--d:2.8s;--delay:.6s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M316 28 Q338 18 332 48 Q326 68 309 58 Q324 44 316 28Z" fill="rgba(147,197,253,.22)"/>
  <!-- Decoration: calendar -->
  <g class="deco" transform="translate(252,454)" opacity=".12">
    <rect x="0" y="10" width="58" height="48" rx="5" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <rect x="0" y="10" width="58" height="18" rx="5" fill="rgba(96,165,250,.15)" stroke="#60a5fa" stroke-width="2"/>
    <line x1="15" y1="0" x2="15" y2="18" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="43" y1="0" x2="43" y2="18" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/>
    <text x="29" y="24" text-anchor="middle" font-size="9" fill="#93c5fd" font-family="sans-serif">2026</text>
    <circle cx="14" cy="40" r="4" fill="rgba(96,165,250,.3)"/>
    <circle cx="29" cy="40" r="4" fill="rgba(96,165,250,.3)"/>
    <circle cx="44" cy="40" r="4" fill="rgba(239,68,68,.4)"/>
    <circle cx="14" cy="52" r="4" fill="rgba(96,165,250,.3)"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(30,64,175,.04)"/>
</svg>

<div class="hero">
  <div class="tag">운세 · 세운</div>
  <div class="big-text">2026년<br><em>丙午년</em><br>주의사항</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">병화(丙火) 강한 해 — 충돌·표출</div>
      <div class="phrase-sub">숨겨진 것이 드러나는 해. 갈등이 표면으로 올라옴</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">수(水) 일간은 충(沖)이 강하게 옴</div>
      <div class="phrase-sub">壬·癸 일간은 대인관계·건강에 특히 주의 필요</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">午火 — 감정·열정 과잉 주의</div>
      <div class="phrase-sub">충동적 투자·연애·결정은 2026년엔 신중하게 🙋</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

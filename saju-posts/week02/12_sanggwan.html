<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상관 있는 사람이 직장 못 다니는 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#020c1a 0%,#091828 55%,#010a16 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.16;}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:22px;}
.tag{display:inline-block;background:rgba(59,130,246,.16);border:1px solid rgba(59,130,246,.32);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:36px;line-height:1.2;color:#fff;text-shadow:0 0 38px rgba(59,130,246,.7),0 0 70px rgba(59,130,246,.3);}
.big-text em{color:#60a5fa;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:13px;}
.phrase-block{border-left:3px solid rgba(59,130,246,.5);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:15.5px;color:#dbeafe;line-height:1.35;text-shadow:0 0 12px rgba(59,130,246,.4);}
.phrase-sub{font-size:11px;color:rgba(147,197,253,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="90" r="1.5" fill="#93c5fd" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="112" cy="46" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="284" cy="114" r="2" fill="#93c5fd" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="78" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="30" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="56" cy="196" r="1" fill="#93c5fd" style="--d:2.1s;--delay:1.3s;"/>
  <circle class="star" cx="326" cy="306" r="1.5" fill="#fff" style="--d:2.8s;--delay:.6s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M316 28 Q338 18 332 48 Q326 68 309 58 Q324 44 316 28Z" fill="rgba(147,197,253,.22)"/>
  <!-- Decoration: broken office tag -->
  <g class="deco" transform="translate(255,455)" opacity=".12">
    <rect x="0" y="15" width="50" height="32" rx="5" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <circle cx="25" cy="10" r="5" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <path d="M25 15 L25 15" stroke="#60a5fa" stroke-width="2"/>
    <path d="M3 30 L47 30" stroke="#60a5fa" stroke-width="1.5"/>
    <path d="M0 40 L50 16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(30,64,175,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="100" fill="rgba(59,130,246,.04)" font-family="serif">傷</text>
</svg>

<div class="hero">
  <div class="tag">十星 · 십성</div>
  <div class="big-text">직장을<br><em>못 다니는</em><br>이유</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">상관 = 정관을 극하는 별</div>
      <div class="phrase-sub">정관이 직장·규칙·권위인데, 상관이 그걸 깨버림</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">윗사람한테 할 말 다 해버림</div>
      <div class="phrase-sub">몇 번째야... 근데 또 함. 입이 문제가 아니라 기질임</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">틀에 갇히면 숨이 막힘</div>
      <div class="phrase-sub">프리랜서·창업·예술이 더 잘 맞는 이유</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

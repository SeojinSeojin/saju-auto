<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍염살 vs 도화살 차이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#1a001a 0%,#2d0030 55%,#0f000f 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.18;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.2s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite 1s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(236,72,153,.18);border:1px solid rgba(236,72,153,.36);color:#f9a8d4;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:20px;line-height:1.35;color:#fff;text-shadow:0 0 22px rgba(236,72,153,.65);}
.title em{color:#f472b6;font-style:normal;}
.compare{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;position:relative;z-index:2;}
.col{display:flex;flex-direction:column;gap:7px;}
.col-header{text-align:center;padding:8px 6px;border-radius:10px;font-family:'Jua',sans-serif;font-size:13.5px;font-weight:700;text-shadow:0 0 12px rgba(236,72,153,.6);}
.col-header.hong{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.col-header.doha{background:rgba(236,72,153,.15);border:1px solid rgba(236,72,153,.3);color:#f9a8d4;}
.col-item{padding:7px 8px;border-radius:9px;font-size:10.5px;color:rgba(255,220,220,.78);line-height:1.45;}
.col-item.hong{background:rgba(239,68,68,.07);border-left:2px solid rgba(239,68,68,.4);}
.col-item.doha{background:rgba(236,72,153,.07);border-left:2px solid rgba(236,72,153,.4);}
.bottom-note{position:relative;z-index:2;background:rgba(236,72,153,.08);border:1px solid rgba(236,72,153,.18);border-radius:10px;padding:8px 13px;text-align:center;}
.bn-text{font-size:10.5px;color:rgba(249,168,212,.75);line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#fca5a5" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="114" cy="44" r="1" fill="#f9a8d4" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="286" cy="112" r="2" fill="#fca5a5" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="28" r="1.5" fill="#f9a8d4" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="196" r="1" fill="#fff" style="--d:2.1s;--delay:1.3s;"/>
  <circle class="star" cx="328" cy="304" r="1.5" fill="#fca5a5" style="--d:2.8s;--delay:.6s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 28 Q340 18 334 48 Q328 68 311 58 Q326 44 318 28Z" fill="rgba(249,168,212,.28)"/>
  <!-- Decoration: flowers (연애 살) -->
  <g class="deco" transform="translate(260,455)" opacity=".15">
    <circle cx="25" cy="25" r="7" fill="rgba(244,114,182,.3)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(0 25 10)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(60 25 25)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(120 25 25)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(180 25 25)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(240 25 25)"/>
    <ellipse cx="25" cy="10" rx="6" ry="9" fill="rgba(244,114,182,.2)" transform="rotate(300 25 25)"/>
  </g>
  <ellipse class="deco" cx="180" cy="340" rx="195" ry="155" fill="rgba(190,24,93,.04)"/>
</svg>

<div class="header">
  <div class="tag">神煞 · 신살</div>
  <div class="title"><em>홍염살</em> vs <em>도화살</em> 차이</div>
</div>

<div class="compare">
  <div class="col">
    <div class="col-header hong">🔥 홍염살</div>
    <div class="col-item hong">일간 기준 특정 지지에 해당<br>(甲→午, 壬→子 등)</div>
    <div class="col-item hong">본인의 매력·섹시함에서 나오는 살</div>
    <div class="col-item hong">이성을 끌어당기는 에너지</div>
    <div class="col-item hong">본인이 주도적으로 매력 발산</div>
    <div class="col-item hong">연애 집착·삼각관계 주의</div>
  </div>
  <div class="col">
    <div class="col-header doha">🌸 도화살</div>
    <div class="col-item doha">연지(年支) 기준 子·午·卯·酉</div>
    <div class="col-item doha">외면적 끌림·인기·애교에서 나옴</div>
    <div class="col-item doha">많은 사람에게 호감을 삼</div>
    <div class="col-item doha">상대가 먼저 다가오는 경향</div>
    <div class="col-item doha">스캔들·구설수 주의</div>
  </div>
</div>

<div class="bottom-note">
  <span class="bn-text">둘 다 있으면? 매력 폭발 조합 ㅠ 뜨끔 🙋</span>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식신 관련 오해와 진실 5가지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#020b18 0%,#0a1628 55%,#01091a 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.2s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite 1s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:19.5px;line-height:1.35;color:#fff;text-shadow:0 0 22px rgba(59,130,246,.55);}
.title em{color:#60a5fa;font-style:normal;}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative;z-index:2;}
.gitem{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.15);border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;box-shadow:0 0 16px rgba(59,130,246,.09);}
.gitem.wide{grid-column:span 2;}
.glabel{font-size:9.5px;font-weight:700;color:rgba(147,197,253,.6);letter-spacing:.4px;text-transform:uppercase;}
.git{font-size:12px;font-weight:700;color:#dbeafe;line-height:1.35;}
.gid{font-size:10px;color:rgba(147,197,253,.6);line-height:1.45;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="88" r="1.5" fill="#93c5fd" style="--d:2.5s;--delay:0s;"/>
  <circle class="star" cx="110" cy="44" r="1" fill="#fff" style="--d:3s;--delay:.6s;"/>
  <circle class="star" cx="285" cy="116" r="2" fill="#93c5fd" style="--d:2.8s;--delay:1s;"/>
  <circle class="star" cx="322" cy="78" r="1" fill="#fff" style="--d:2.1s;--delay:.4s;"/>
  <circle class="star" cx="194" cy="28" r="1.5" fill="#fff" style="--d:3.3s;--delay:.8s;"/>
  <circle class="star" cx="60" cy="194" r="1" fill="#93c5fd" style="--d:2.3s;--delay:1.4s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(147,197,253,.25)"/>
  <!-- Decoration: bowl/food circles -->
  <g class="deco" transform="translate(258,455)" opacity=".12">
    <ellipse cx="25" cy="30" rx="22" ry="14" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <path d="M3 30 Q25 20 47 30" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <line x1="25" y1="10" x2="25" y2="4" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="25" cy="3" r="3" fill="rgba(96,165,250,.4)"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="195" ry="155" fill="rgba(30,64,175,.04)"/>
</svg>

<div class="header">
  <div class="tag">十星 · 십성</div>
  <div class="title"><em>식신</em> 관련<br>오해와 진실 5가지</div>
</div>

<div class="grid">
  <div class="gitem">
    <span class="glabel">오해 ✗</span>
    <span class="git">식신 = 먹복만 있음</span>
    <span class="gid">먹복도 있지만 창의력·표현력·자식운·돈복까지 담당</span>
  </div>
  <div class="gitem">
    <span class="glabel">진실 ✓</span>
    <span class="git">식신은 재성을 생함</span>
    <span class="gid">식신생재(食神生財) — 내 능력이 돈을 만드는 구조</span>
  </div>
  <div class="gitem">
    <span class="glabel">오해 ✗</span>
    <span class="git">식신 많으면 게으름</span>
    <span class="gid">과다면 느릴 수 있지만 적당하면 여유로운 천재임</span>
  </div>
  <div class="gitem">
    <span class="glabel">진실 ✓</span>
    <span class="git">식신이 편관 억제</span>
    <span class="gid">식신제살(食神制殺) — 강한 편관을 부드럽게 다스림</span>
  </div>
  <div class="gitem wide">
    <span class="glabel">핵심 💡</span>
    <span class="git">식신은 내가 즐기면서 잘하는 것</span>
    <span class="gid">억지로 하면 식신이 죽음. 좋아하는 일로 돈 버는 구조가 맞음. 이거 나잖아 🙋</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

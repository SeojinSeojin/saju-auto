<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정관 있는 사람 vs 편관 있는 사람 차이</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#020c1c 0%,#091828 55%,#010a18 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:11px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.3s ease-in-out infinite;}
.deco{animation:shimmer 6.2s ease-in-out infinite 1s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(59,130,246,.16);border:1px solid rgba(59,130,246,.32);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:17.5px;line-height:1.4;color:#fff;text-shadow:0 0 20px rgba(59,130,246,.55);}
.title em{color:#60a5fa;font-style:normal;}
.compare{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;position:relative;z-index:2;}
.col{display:flex;flex-direction:column;gap:7px;}
.col-header{text-align:center;padding:8px 6px;border-radius:10px;font-family:'Jua',sans-serif;font-size:13px;font-weight:700;}
.col-header.jg{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;text-shadow:0 0 10px rgba(59,130,246,.5);}
.col-header.pg{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);color:#fca5a5;text-shadow:0 0 10px rgba(239,68,68,.45);}
.col-item{padding:7px 8px;border-radius:9px;font-size:10.5px;color:rgba(220,235,255,.78);line-height:1.45;}
.col-item.jg{background:rgba(59,130,246,.07);border-left:2px solid rgba(59,130,246,.4);}
.col-item.pg{background:rgba(239,68,68,.06);border-left:2px solid rgba(239,68,68,.35);}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="88" r="1.5" fill="#93c5fd" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="112" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="286" cy="114" r="2" fill="#93c5fd" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="322" cy="78" r="1" fill="#fff" style="--d:2.1s;--delay:.4s;"/>
  <circle class="star" cx="198" cy="30" r="1.5" fill="#fff" style="--d:3.3s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="198" r="1" fill="#93c5fd" style="--d:2.3s;--delay:1.4s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(147,197,253,.22)"/>
  <!-- Decoration: scale/balance -->
  <g class="deco" transform="translate(252,452)" opacity=".12">
    <line x1="32" y1="5" x2="32" y2="15" stroke="#60a5fa" stroke-width="2"/>
    <line x1="10" y1="15" x2="54" y2="15" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="10" cy="15" r="12" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <circle cx="54" cy="15" r="12" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <line x1="32" y1="40" x2="32" y2="55" stroke="#60a5fa" stroke-width="2"/>
    <rect x="25" y="55" width="14" height="4" rx="2" fill="rgba(96,165,250,.4)"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="195" ry="155" fill="rgba(30,64,175,.04)"/>
</svg>

<div class="header">
  <div class="tag">十星 · 십성</div>
  <div class="title"><em>정관</em> 있는 사람 vs <em>편관</em> 있는 사람 차이</div>
</div>

<div class="compare">
  <div class="col">
    <div class="col-header jg">⚖️ 정관</div>
    <div class="col-item jg">규칙·원칙을 지키는 것이 편안함</div>
    <div class="col-item jg">안정적이고 체계적인 조직에서 빛남</div>
    <div class="col-item jg">느리지만 꾸준히 올라가는 스타일</div>
    <div class="col-item jg">평판·명예를 중요하게 여김</div>
    <div class="col-item jg">변화보다 안정을 택함</div>
  </div>
  <div class="col">
    <div class="col-header pg">⚡ 편관</div>
    <div class="col-item pg">규칙이 답답하고 판을 깨고 싶어함</div>
    <div class="col-item pg">위기 상황·도전적 환경에서 강해짐</div>
    <div class="col-item pg">빠르게 치고 나가는 과감한 스타일</div>
    <div class="col-item pg">결과로 증명하는 것이 더 중요</div>
    <div class="col-item pg">안정보다 폭발적 성공을 원함</div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

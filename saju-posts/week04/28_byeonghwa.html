<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>병화 일간 — 존재 자체가 에너지인 사람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#1a0000 0%,#2e0500 55%,#0a0000 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
@keyframes flicker{0%,100%{opacity:.8;transform:scale(1);}50%{opacity:1;transform:scale(1.03);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:22px;}
.tag{display:inline-block;background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.36);color:#fca5a5;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:38px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(239,68,68,.8),0 0 80px rgba(239,68,68,.3);}
.big-text em{color:#f87171;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:13px;}
.phrase-block{border-left:3px solid rgba(239,68,68,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:15.5px;color:#fee2e2;line-height:1.35;text-shadow:0 0 12px rgba(239,68,68,.4);}
.phrase-sub{font-size:11px;color:rgba(252,165,165,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="88" r="1.5" fill="#fca5a5" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="110" cy="44" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="284" cy="112" r="2" fill="#fca5a5" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="318" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="192" cy="28" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="56" cy="192" r="1" fill="#fca5a5" style="--d:2.1s;--delay:1.3s;"/>
  <circle class="star" cx="325" cy="306" r="1.5" fill="#fff" style="--d:2.8s;--delay:.6s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M316 28 Q338 18 332 48 Q326 68 309 58 Q324 44 316 28Z" fill="rgba(252,165,165,.25)"/>
  <!-- Decoration: sun/flame (화 = fire) -->
  <g class="deco" transform="translate(255,450)" opacity=".14" style="animation:flicker 3s ease-in-out infinite;">
    <circle cx="28" cy="28" r="14" fill="rgba(239,68,68,.25)" stroke="#ef4444" stroke-width="2"/>
    <line x1="28" y1="5" x2="28" y2="1" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="51" x2="28" y2="55" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="28" x2="1" y2="28" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="51" y1="28" x2="55" y2="28" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="9" y2="9" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="12" x2="47" y2="9" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="44" x2="9" y2="47" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="44" y1="44" x2="47" y2="47" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(185,28,28,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="100" fill="rgba(239,68,68,.04)" font-family="serif">丙</text>
</svg>

<div class="hero">
  <div class="tag">일간 · 火</div>
  <div class="big-text">존재 자체가<br><em>에너지인</em><br>사람</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">병화 = 태양의 일간</div>
      <div class="phrase-sub">방 안에 들어오면 분위기가 밝아짐. 본인도 모름</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">숨기는 게 없고 투명함</div>
      <div class="phrase-sub">표정에 다 나옴. 포커페이스가 안 됨 ㅠ</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">빛이 강하면 그늘도 깊다</div>
      <div class="phrase-sub">번아웃이 왔을 때 주변까지 영향받음. 뜨끔 🙋</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>충(沖) 궁합 — 싸우는데 헤어지질 못하는 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#1a0010 0%,#2d0022 55%,#0f000e 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.18;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.2s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite .8s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(236,72,153,.18);border:1px solid rgba(236,72,153,.36);color:#f9a8d4;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:18.5px;line-height:1.4;color:#fff;text-shadow:0 0 22px rgba(236,72,153,.65);}
.title em{color:#f472b6;font-style:normal;}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative;z-index:2;}
.gitem{background:rgba(236,72,153,.07);border:1px solid rgba(236,72,153,.15);border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;box-shadow:0 0 16px rgba(236,72,153,.09);}
.gitem.wide{grid-column:span 2;}
.gpair{font-family:'Jua',sans-serif;font-size:14px;color:#f9a8d4;text-shadow:0 0 8px rgba(236,72,153,.7);}
.git{font-size:11px;font-weight:700;color:#fce7f3;line-height:1.35;}
.gid{font-size:10px;color:rgba(249,168,212,.58);line-height:1.45;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="88" r="1.5" fill="#fca5a5" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="112" cy="44" r="1" fill="#f9a8d4" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="286" cy="114" r="2" fill="#fca5a5" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="322" cy="78" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="198" cy="30" r="1.5" fill="#f9a8d4" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="198" r="1" fill="#fff" style="--d:2.2s;--delay:1.4s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M320 30 Q342 20 336 50 Q330 70 313 60 Q328 46 320 30Z" fill="rgba(249,168,212,.28)"/>
  <!-- Decoration: push-pull arrows -->
  <g class="deco" transform="translate(252,455)" opacity=".14">
    <path d="M5 20 L35 20" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M5 20 L14 12 M5 20 L14 28" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M55 35 L25 35" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M55 35 L46 27 M55 35 L46 43" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="340" rx="195" ry="155" fill="rgba(190,24,93,.04)"/>
</svg>

<div class="header">
  <div class="tag">궁합 · 충</div>
  <div class="title"><em>충(沖) 궁합</em><br>싸우는데 헤어지질 못하는 이유</div>
</div>

<div class="grid">
  <div class="gitem">
    <span class="gpair">子 ↔ 午</span>
    <span class="git">물과 불의 충돌</span>
    <span class="gid">극과 극. 끌리는데 부딪힘</span>
  </div>
  <div class="gitem">
    <span class="gpair">丑 ↔ 未</span>
    <span class="git">토끼리 충돌</span>
    <span class="gid">가치관 충돌. 고집 vs 고집</span>
  </div>
  <div class="gitem">
    <span class="gpair">寅 ↔ 申</span>
    <span class="git">목과 금의 충돌</span>
    <span class="gid">자유 vs 원칙. 흥미롭게 끌림</span>
  </div>
  <div class="gitem">
    <span class="gpair">卯 ↔ 酉</span>
    <span class="git">감성 vs 이성</span>
    <span class="gid">느낌 vs 논리. 서로 신기해함</span>
  </div>
  <div class="gitem wide">
    <span class="git">충 궁합이 헤어지지 못하는 이유 💡</span>
    <span class="gid">자극이 강해서 상대방이 없으면 심심함. 싸워도 돌아옴. 이거 나잖아 🙋 — 충이 있어도 합이 많으면 안정됨</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임수 일간 — 깊고 조용한데 속을 모르겠는 사람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#00051a 0%,#000f2e 55%,#000210 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.18;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.2s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite .8s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.36);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:17.5px;line-height:1.4;color:#fff;text-shadow:0 0 22px rgba(59,130,246,.6);}
.title em{color:#60a5fa;font-style:normal;}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative;z-index:2;}
.gitem{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.15);border-radius:12px;padding:13px 11px;display:flex;flex-direction:column;gap:5px;box-shadow:0 0 16px rgba(59,130,246,.1);}
.gitem.wide{grid-column:span 2;}
.gicon{font-size:20px;}
.git{font-size:12px;font-weight:700;color:#dbeafe;line-height:1.35;}
.gid{font-size:10px;color:rgba(147,197,253,.58);line-height:1.45;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="90" r="1.5" fill="#93c5fd" style="--d:2.5s;--delay:0s;"/>
  <circle class="star" cx="110" cy="46" r="1" fill="#fff" style="--d:3s;--delay:.6s;"/>
  <circle class="star" cx="285" cy="116" r="2" fill="#93c5fd" style="--d:2.8s;--delay:1s;"/>
  <circle class="star" cx="320" cy="80" r="1" fill="#fff" style="--d:2.1s;--delay:.4s;"/>
  <circle class="star" cx="194" cy="30" r="1.5" fill="#fff" style="--d:3.3s;--delay:.8s;"/>
  <circle class="star" cx="60" cy="194" r="1" fill="#93c5fd" style="--d:2.3s;--delay:1.4s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(147,197,253,.25)"/>
  <!-- Decoration: water waves (수 = water) -->
  <g class="deco" transform="translate(248,460)" opacity=".14">
    <path d="M0 15 Q10 5 20 15 Q30 25 40 15 Q50 5 60 15" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M0 28 Q10 18 20 28 Q30 38 40 28 Q50 18 60 28" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" opacity=".6"/>
    <path d="M5 40 Q15 30 25 40 Q35 50 45 40" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".3"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="195" ry="155" fill="rgba(29,78,216,.04)"/>
</svg>

<div class="header">
  <div class="tag">일간 · 水</div>
  <div class="title"><em>임수(壬水)</em> 일간<br>깊고 조용한데 속을 모르겠는 사람</div>
</div>

<div class="grid">
  <div class="gitem">
    <span class="gicon">🌊</span>
    <span class="git">깊은 바다 같은 사람</span>
    <span class="gid">표면은 잔잔한데 내면은 엄청난 것들이 소용돌이침</span>
  </div>
  <div class="gitem">
    <span class="gicon">🤫</span>
    <span class="git">속마음을 잘 안 꺼냄</span>
    <span class="gid">다 알고 있지만 말하지 않음. 알아서 눈치 채줬으면</span>
  </div>
  <div class="gitem">
    <span class="gicon">🧠</span>
    <span class="git">직관력과 지략이 탁월</span>
    <span class="gid">흐르면서 막힌 곳을 돌아가는 지혜가 있음</span>
  </div>
  <div class="gitem">
    <span class="gicon">🔄</span>
    <span class="git">유연하지만 결국 내 방향으로</span>
    <span class="gid">물처럼 맞춰주는 것 같지만 방향은 내가 정함</span>
  </div>
  <div class="gitem wide">
    <span class="gicon">💡</span>
    <span class="git">임수는 지(知)의 별 — 알면 알수록 더 깊어짐</span>
    <span class="gid">화(火)가 필요한 이유: 너무 차가워지면 얼어붙음. 따뜻한 관계가 임수를 살아있게 함 🙋</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

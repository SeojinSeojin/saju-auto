<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>을목 일간 — 유연한 척하지만 절대 안 꺾이는 사람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#001608 0%,#002410 55%,#000e04 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.18;transform:scale(1.04);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:20px;}
.tag{display:inline-block;background:rgba(16,185,129,.17);border:1px solid rgba(16,185,129,.34);color:#6ee7b7;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:34px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(16,185,129,.8),0 0 80px rgba(16,185,129,.3);}
.big-text em{color:#34d399;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:13px;}
.phrase-block{border-left:3px solid rgba(16,185,129,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:14px;color:#d1fae5;line-height:1.35;text-shadow:0 0 10px rgba(16,185,129,.4);}
.phrase-sub{font-size:10.5px;color:rgba(110,231,183,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#6ee7b7" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="116" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="288" cy="118" r="2" fill="#34d399" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="324" cy="76" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="200" cy="30" r="1.5" fill="#6ee7b7" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="200" r="1" fill="#fff" style="--d:2.2s;--delay:1.3s;"/>
  <path class="moon" d="M322 28 Q344 18 338 48 Q332 68 315 58 Q330 44 322 28Z" fill="rgba(110,231,183,.26)"/>
  <!-- Vine/ivy deco (을목 = vine, flexible but strong) -->
  <g class="deco" transform="translate(258,440)" opacity=".14">
    <path d="M25 60 Q10 50 15 35 Q20 20 25 10 Q28 20 32 28 Q38 18 35 8 Q42 22 38 38 Q42 50 30 60Z" stroke="#10b981" stroke-width="1.5" fill="none"/>
    <path d="M25 35 Q10 30 8 22" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M30 28 Q45 24 48 18" stroke="#059669" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="20" rx="5" ry="4" fill="rgba(16,185,129,.3)"/>
    <ellipse cx="48" cy="16" rx="5" ry="4" fill="rgba(16,185,129,.3)"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="200" ry="165" fill="rgba(5,150,105,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(16,185,129,.04)" font-family="serif">乙</text>
</svg>

<div class="hero">
  <div class="tag">일간 · 乙木</div>
  <div class="big-text">휘어도<br><em>꺾이지</em><br>않는 사람</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">을목 = 덩굴·풀·유연한 나무</div>
      <div class="phrase-sub">바람에 흔들리지만 뿌리째 뽑히지 않는 생명력</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">유연한 척하지만 핵심은 안 바꿈</div>
      <div class="phrase-sub">표면은 맞춰주되 자신의 가치관은 절대 타협하지 않음</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">적응력 = 갑목보다 생존력 강함</div>
      <div class="phrase-sub">환경이 어떻게 바뀌어도 끝까지 살아남는 식물 기질 🌿</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

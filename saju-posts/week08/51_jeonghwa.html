<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정화 일간 — 주변을 따뜻하게 하다가 혼자 꺼져버리는 사람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#160800 0%,#2a1000 55%,#0e0600 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.18;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:8px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.3s ease-in-out infinite;}
.deco{animation:shimmer 6.2s ease-in-out infinite 1s;}
.header{position:relative;z-index:2;margin-bottom:4px;}
.tag{display:inline-block;background:rgba(234,88,12,.17);border:1px solid rgba(234,88,12,.34);color:#fdba74;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:17px;line-height:1.42;color:#fff;text-shadow:0 0 22px rgba(234,88,12,.6);}
.title em{color:#fb923c;font-style:normal;}
.items{flex:1;display:flex;flex-direction:column;gap:7px;position:relative;z-index:2;}
.item{display:flex;align-items:flex-start;gap:0;border-left:3px solid rgba(234,88,12,.5);padding:7px 12px;background:rgba(234,88,12,.07);border-radius:0 10px 10px 0;box-shadow:0 0 12px rgba(234,88,12,.08);}
.item-inner{display:flex;flex-direction:column;gap:2px;}
.it{font-size:12.5px;font-weight:700;color:#ffedd5;line-height:1.3;}
.id{font-size:10.5px;color:rgba(253,186,116,.62);line-height:1.4;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#fdba74" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="114" cy="46" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="286" cy="116" r="2" fill="#fb923c" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="322" cy="78" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="198" cy="30" r="1.5" fill="#fdba74" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="62" cy="198" r="1" fill="#fff" style="--d:2.2s;--delay:1.4s;"/>
  <path class="moon" d="M320 30 Q342 20 336 50 Q330 70 313 60 Q328 46 320 30Z" fill="rgba(253,186,116,.25)"/>
  <!-- Candle deco (정화 = candle flame) -->
  <g class="deco" transform="translate(264,448)" opacity=".14">
    <path d="M20 42 Q10 32 12 18 Q16 6 20 2 Q21 14 25 20 Q28 12 26 2 Q32 14 30 26 Q32 38 22 42Z" stroke="#f97316" stroke-width="1.5" fill="rgba(234,88,12,.15)"/>
    <rect x="16" y="42" width="12" height="22" rx="2" stroke="#ea580c" stroke-width="1.5" fill="none"/>
    <line x1="10" y1="42" x2="34" y2="42" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="196" ry="156" fill="rgba(124,45,18,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(234,88,12,.04)" font-family="serif">丁</text>
</svg>

<div class="header">
  <div class="tag">일간 · 丁火</div>
  <div class="title"><em>정화(丁火)</em> 일간<br>주변을 따뜻하게 하다가<br>혼자 꺼져버리는 사람</div>
</div>

<div class="items">
  <div class="item"><div class="item-inner"><span class="it">정화 = 촛불·등불. 어둠을 비추는 존재</span><span class="id">작지만 주변 전체를 밝히는 헌신적 기질</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">자기가 소모되는 것을 모르고 줌</span><span class="id">병화처럼 폭발적이지 않아 내가 꺼지는 걸 뒤늦게 앎</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">감수성이 예민하고 표정에 다 나옴</span><span class="id">솔직한 감정이 장점인 동시에 상처받는 이유</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">주변에 수(水)가 많으면 꺼질 위험</span><span class="id">물이 너무 많으면 불이 꺼짐. 비판적 환경 조심</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">나를 지키는 연습이 가장 중요한 숙제</span><span class="id">정화 있는 분들, 오늘 자신을 먼저 따뜻하게 해주세요 🕯️</span></div></div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

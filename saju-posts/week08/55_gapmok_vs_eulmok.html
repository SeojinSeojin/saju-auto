<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갑목 vs 을목 — 같은 목인데 왜 이렇게 다른가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#010e06 0%,#021808 55%,#010a04 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:18px;}
.tag{display:inline-block;background:rgba(16,185,129,.16);border:1px solid rgba(16,185,129,.32);color:#6ee7b7;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:30px;line-height:1.2;color:#fff;text-shadow:0 0 35px rgba(16,185,129,.7),0 0 65px rgba(16,185,129,.25);}
.big-text em{color:#34d399;font-style:normal;}
.compare-blocks{display:flex;gap:10px;}
.cb{flex:1;border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;}
.cb.gp{background:rgba(16,185,129,.09);border:1px solid rgba(16,185,129,.2);}
.cb.em{background:rgba(52,211,153,.07);border:1px solid rgba(110,231,183,.18);}
.cb-title{font-family:'Jua',sans-serif;font-size:14px;font-weight:700;line-height:1;}
.cb-title.gp{color:#34d399;text-shadow:0 0 10px rgba(16,185,129,.5);}
.cb-title.em{color:#6ee7b7;text-shadow:0 0 10px rgba(52,211,153,.45);}
.cb-item{font-size:10.5px;color:rgba(209,250,229,.72);line-height:1.45;padding-left:8px;border-left:2px solid rgba(255,255,255,.1);}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="90" r="1.5" fill="#6ee7b7" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="110" cy="46" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="116" r="2" fill="#34d399" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="318" cy="80" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="194" cy="30" r="1.5" fill="#6ee7b7" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="56" cy="194" r="1" fill="#fff" style="--d:2.1s;--delay:1.3s;"/>
  <path class="moon" d="M316 28 Q338 18 332 48 Q326 68 309 58 Q324 44 316 28Z" fill="rgba(110,231,183,.22)"/>
  <!-- Two trees side by side -->
  <g class="deco" transform="translate(248,438)" opacity=".13">
    <line x1="16" y1="0" x2="16" y2="62" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="28" y2="8" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="28" x2="4" y2="20" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="16" cy="4" rx="10" ry="8" fill="rgba(16,185,129,.25)"/>
    <line x1="42" y1="4" x2="42" y2="62" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 4 Q42 2 46 6 Q50 12 42 14 Q36 12 36 6 Q38 2 42 2Z" stroke="#10b981" stroke-width="1.5" fill="rgba(52,211,153,.2)"/>
    <path d="M34 20 Q42 16 50 22 Q54 28 42 30 Q30 28 34 20Z" stroke="#10b981" stroke-width="1.5" fill="rgba(52,211,153,.15)"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(5,150,105,.04)"/>
</svg>

<div class="hero">
  <div class="tag">일간 비교 · 木</div>
  <div class="big-text">같은 목,<br><em>왜 이렇게</em><br>다른가</div>
  <div class="compare-blocks">
    <div class="cb gp">
      <div class="cb-title gp">🌲 갑목(甲)</div>
      <div class="cb-item">하늘로 솟는 큰 나무</div>
      <div class="cb-item">굽히지 않는 원칙</div>
      <div class="cb-item">리더·선구자 기질</div>
      <div class="cb-item">외롭지만 가장 높음</div>
      <div class="cb-item">경직될 수 있음</div>
    </div>
    <div class="cb em">
      <div class="cb-title em">🌿 을목(乙)</div>
      <div class="cb-item">바람에 흔들리는 덩굴</div>
      <div class="cb-item">유연하지만 안 꺾임</div>
      <div class="cb-item">적응·생존 기질</div>
      <div class="cb-item">어디서든 살아남음</div>
      <div class="cb-item">끈질긴 생명력 🙋</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

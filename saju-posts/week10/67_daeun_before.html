<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대운 바뀌기 전에 해야 할 것들</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#0e0800 0%,#1e1200 55%,#0a0600 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.18;transform:scale(1.04);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;}
.tag{display:inline-block;background:rgba(245,158,11,.17);border:1px solid rgba(245,158,11,.34);color:#fcd34d;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:34px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(245,158,11,.8),0 0 80px rgba(245,158,11,.3);}
.big-text em{color:#fbbf24;font-style:normal;display:block;}
.phrases{display:flex;flex-direction:column;gap:12px;}
.phrase-block{border-left:3px solid rgba(245,158,11,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:14px;color:#fef3c7;line-height:1.35;text-shadow:0 0 10px rgba(245,158,11,.4);}
.phrase-sub{font-size:10.5px;color:rgba(253,211,77,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#fcd34d" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="116" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="288" cy="118" r="2" fill="#fbbf24" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="324" cy="76" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="200" cy="30" r="1.5" fill="#fcd34d" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="200" r="1" fill="#fff" style="--d:2.2s;--delay:1.3s;"/>
  <path class="moon" d="M322 28 Q344 18 338 48 Q332 68 315 58 Q330 44 322 28Z" fill="rgba(253,211,77,.28)"/>
  <!-- Hourglass deco -->
  <g class="deco" transform="translate(262,452)" opacity=".13">
    <path d="M8 8 L48 8 L30 30 L48 52 L8 52 L26 30 Z" stroke="#d97706" stroke-width="2" fill="rgba(217,119,6,.1)" stroke-linejoin="round"/>
    <line x1="8" y1="8" x2="48" y2="8" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="52" x2="48" y2="52" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="30" cy="30" r="4" fill="rgba(245,158,11,.4)"/>
  </g>
  <ellipse class="deco" cx="180" cy="350" rx="200" ry="165" fill="rgba(146,64,14,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(245,158,11,.04)" font-family="serif">大</text>
</svg>

<div class="hero">
  <div class="tag">실용 정보 · 대운</div>
  <div class="big-text">대운 바뀌기<br><em>전에</em><br>해야 할 것들</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">2~3년 전부터 예조가 옴</div>
      <div class="phrase-sub">갑자기 바뀌는 게 아님. 미리 징조가 보이기 시작함</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">현재 대운의 성과를 마무리할 것</div>
      <div class="phrase-sub">다음 대운에 새 씨앗을 뿌리려면 현재를 깔끔히 정리해야 함</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">전환기 1년은 관찰 우선</div>
      <div class="phrase-sub">큰 결정은 미루고 방향을 읽는 시간. 움직임보다 준비가 먼저 🌟</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공망살 — 뭘 해도 안 풀리는 진짜 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(150deg,#080318 0%,#130228 55%,#060720 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.16;transform:scale(1.03);}}
.card{width:360px;height:640px;padding:64px 22px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 6s ease-in-out infinite 1.2s;}
.header{position:relative;z-index:2;margin-bottom:4px;}
.tag{display:inline-block;background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.38);color:#a78bfa;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:20px;line-height:1.35;color:#fff;text-shadow:0 0 22px rgba(139,92,246,.7);}
.title em{color:#a78bfa;font-style:normal;}
.items{flex:1;display:flex;flex-direction:column;gap:7px;position:relative;z-index:2;}
.item{display:flex;align-items:flex-start;gap:0;border-left:3px solid rgba(139,92,246,.5);padding:7px 12px;background:rgba(139,92,246,.06);border-radius:0 10px 10px 0;box-shadow:0 0 12px rgba(139,92,246,.07);}
.item-inner{display:flex;flex-direction:column;gap:2px;}
.it{font-size:12.5px;font-weight:700;color:#ddd6fe;line-height:1.3;}
.id{font-size:10.5px;color:rgba(196,181,253,.6);line-height:1.4;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="92" r="1.5" fill="#fff" style="--d:2.4s;--delay:.2s;"/>
  <circle class="star" cx="115" cy="48" r="1" fill="#a78bfa" style="--d:3.2s;--delay:.7s;"/>
  <circle class="star" cx="285" cy="108" r="2" fill="#fff" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="322" cy="72" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="205" cy="32" r="1.5" fill="#a78bfa" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="65" cy="205" r="1" fill="#fff" style="--d:2.2s;--delay:1.3s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M322 30 Q344 20 338 50 Q332 70 315 60 Q330 46 322 30Z" fill="rgba(167,139,250,.32)"/>
  <!-- Decoration: empty void circle (공망 = empty/void) -->
  <g class="deco" transform="translate(260,455)" opacity=".1">
    <circle cx="30" cy="30" r="28" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
    <path d="M10 50 L50 10" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="330" rx="195" ry="155" fill="rgba(109,40,217,.04)"/>
</svg>

<div class="header">
  <div class="tag">神煞 · 신살</div>
  <div class="title"><em>공망살</em><br>뭘 해도 안 풀리는 진짜 이유</div>
</div>

<div class="items">
  <div class="item"><div class="item-inner"><span class="it">공망은 해당 육친이 텅 비는 현상</span><span class="id">기둥에 해당하는 지지가 허공에 뜸</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">재성 공망 → 돈이 손에 안 잡힘</span><span class="id">벌어도 사라짐. 구멍 뚫린 지갑</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">관성 공망 → 직장·지위가 흔들림</span><span class="id">취업해도 오래 못 있는 패턴</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">인성 공망 → 학업·부모 덕이 약해짐</span><span class="id">열심히 해도 결과가 뻥 뚫린 느낌</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">공망 해에는 계획이 자꾸 틀어짐</span><span class="id">몇 번째야... 근데 또 짬</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">충(沖)을 만나면 해공(解空)됨</span><span class="id">공망이 풀리는 조건도 있으니 희망 있음</span></div></div>
  <div class="item"><div class="item-inner"><span class="it">오히려 영적·예술적 감각이 열리기도</span><span class="id">비어 있어서 더 깊이 채워지는 역설</span></div></div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

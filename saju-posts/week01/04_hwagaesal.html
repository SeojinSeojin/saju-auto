<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화개살 있는 사람이 예술에 빠지는 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#0b0420 0%,#160535 55%,#090918 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.07;}50%{opacity:.2;}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.08);opacity:.9;}}
.card{width:360px;height:640px;padding:62px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
/* Full-bleed typo template */
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:28px;}
.tag{display:inline-block;background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.36);color:#c084fc;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:42px;line-height:1.15;color:#fff;text-shadow:0 0 40px rgba(168,85,247,.8),0 0 80px rgba(168,85,247,.3);}
.big-text em{color:#c084fc;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:16px;}
.phrase-block{border-left:3px solid rgba(168,85,247,.6);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:18px;color:#e9d5ff;line-height:1.3;text-shadow:0 0 15px rgba(168,85,247,.5);}
.phrase-sub{font-size:11px;color:rgba(196,181,253,.6);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="35" cy="88" r="1.5" fill="#fff" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="108" cy="44" r="1" fill="#c084fc" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="112" r="2" fill="#fff" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="192" cy="28" r="1.5" fill="#c084fc" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="55" cy="192" r="1" fill="#fff" style="--d:2.1s;--delay:1.3s;"/>
  <circle class="star" cx="330" cy="310" r="1" fill="#c084fc" style="--d:2.9s;--delay:.4s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(192,132,252,.32)"/>
  <!-- Decoration: lotus flower (화개살 = flower cover/canopy) -->
  <g class="deco" transform="translate(255,450)" opacity=".15">
    <ellipse cx="30" cy="15" rx="12" ry="22" fill="rgba(196,181,253,.3)" transform="rotate(-30 30 15)"/>
    <ellipse cx="30" cy="15" rx="12" ry="22" fill="rgba(196,181,253,.3)" transform="rotate(0 30 15)"/>
    <ellipse cx="30" cy="15" rx="12" ry="22" fill="rgba(196,181,253,.3)" transform="rotate(30 30 15)"/>
    <ellipse cx="30" cy="15" rx="12" ry="22" fill="rgba(196,181,253,.3)" transform="rotate(60 30 15)"/>
    <circle cx="30" cy="20" r="8" fill="rgba(168,85,247,.4)"/>
  </g>
  <!-- Big shimmer background -->
  <ellipse class="deco" cx="180" cy="360" rx="200" ry="180" fill="rgba(109,40,217,.05)"/>
  <!-- Decorative large faint text -->
  <text x="180" y="500" text-anchor="middle" font-size="120" fill="rgba(168,85,247,.04)" font-family="serif">華</text>
</svg>

<div class="hero">
  <div class="tag">神煞 · 신살</div>
  <div class="big-text">예술이<br><em>숙명인</em><br>사람</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">화개살 = 예술적 감수성의 살</div>
      <div class="phrase-sub">辰·未·戌·丑에 앉는 화개살, 고독함이 창의력이 됨</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">혼자 있는 시간이 충전됨</div>
      <div class="phrase-sub">군중 속에서도 섬처럼 존재함. 본인도 알고 있음</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">종교·철학·예술로 빠지는 이유</div>
      <div class="phrase-sub">세상보다 내면이 더 넓기 때문. 이거 나잖아 🙋</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

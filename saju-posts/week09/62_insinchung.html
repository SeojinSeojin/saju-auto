<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인신충 궁합 — 끊임없이 자극하는 조합</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#180800 0%,#2c1000 55%,#100600 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.18;transform:scale(1.04);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;}
.tag{display:inline-block;background:rgba(234,88,12,.18);border:1px solid rgba(234,88,12,.36);color:#fdba74;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:34px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(234,88,12,.8),0 0 80px rgba(234,88,12,.3);}
.big-text em{color:#fb923c;font-style:normal;display:block;}
.phrases{display:flex;flex-direction:column;gap:12px;}
.phrase-block{border-left:3px solid rgba(234,88,12,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:14px;color:#ffedd5;line-height:1.35;text-shadow:0 0 10px rgba(234,88,12,.4);}
.phrase-sub{font-size:10.5px;color:rgba(253,186,116,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#fdba74" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="116" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="288" cy="118" r="2" fill="#fb923c" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="324" cy="76" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="200" cy="30" r="1.5" fill="#fdba74" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="200" r="1" fill="#fff" style="--d:2.2s;--delay:1.3s;"/>
  <path class="moon" d="M322 28 Q344 18 338 48 Q332 68 315 58 Q330 44 322 28Z" fill="rgba(253,186,116,.28)"/>
  <!-- Tiger + Monkey (寅 + 申) -->
  <g class="deco" transform="translate(254,452)" opacity=".12">
    <path d="M0 25 L20 5 L40 25 L20 45Z" stroke="#ea580c" stroke-width="2" fill="rgba(234,88,12,.12)" stroke-linejoin="round"/>
    <path d="M30 25 L50 5 L70 25 L50 45Z" stroke="#f97316" stroke-width="2" fill="rgba(249,115,22,.1)" stroke-linejoin="round"/>
    <line x1="38" y1="25" x2="32" y2="25" stroke="#fb923c" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 2"/>
  </g>
  <ellipse class="deco" cx="180" cy="350" rx="200" ry="165" fill="rgba(124,45,18,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(234,88,12,.04)" font-family="serif">沖</text>
</svg>

<div class="hero">
  <div class="tag">사주 궁합 · 인신충</div>
  <div class="big-text">끊임없이<br><em>자극하는</em><br>조합</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">인신충(寅申沖) = 호랑이 vs 원숭이</div>
      <div class="phrase-sub">서로 다른 방향으로 달리는 에너지. 만나면 충돌이 일어남</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">싸워도 자극이 강해 떠나기 어려움</div>
      <div class="phrase-sub">무자극보다 유자극을 선택하게 되는 중독성 있는 관계</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">서로를 성장시키는 최고의 조건</div>
      <div class="phrase-sub">충 에너지를 경쟁·격려로 쓰면 두 사람 모두 레벨업 ⚡</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

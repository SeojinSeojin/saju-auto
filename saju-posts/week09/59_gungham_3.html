<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주 궁합 볼 때 진짜 봐야 할 것 3가지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#080220 0%,#120432 55%,#060818 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.4s ease-in-out infinite;}
.deco{animation:shimmer 6.8s ease-in-out infinite .9s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(139,92,246,.17);border:1px solid rgba(139,92,246,.34);color:#a78bfa;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:19px;line-height:1.4;color:#fff;text-shadow:0 0 22px rgba(139,92,246,.62);}
.title em{color:#a78bfa;font-style:normal;}
.cards{flex:1;display:flex;flex-direction:column;gap:12px;position:relative;z-index:2;}
.big-card{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18);border-radius:14px;padding:16px 16px;display:flex;flex-direction:column;gap:6px;box-shadow:0 0 20px rgba(139,92,246,.1);}
.num-label{font-family:'Jua',sans-serif;font-size:28px;color:#7c3aed;line-height:1;text-shadow:0 0 12px rgba(139,92,246,.8);}
.bc-title{font-family:'Jua',sans-serif;font-size:16px;color:#ede9fe;line-height:1.3;}
.bc-sub{font-size:11px;color:rgba(196,181,253,.62);line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="88" r="1.5" fill="#a78bfa" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="112" cy="44" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="116" r="2" fill="#7c3aed" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="28" r="1.5" fill="#a78bfa" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="196" r="1" fill="#fff" style="--d:2.1s;--delay:1.3s;"/>
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(167,139,250,.28)"/>
  <!-- Yin yang deco -->
  <g class="deco" transform="translate(258,456)" opacity=".11">
    <circle cx="28" cy="28" r="26" stroke="#7c3aed" stroke-width="2" fill="none"/>
    <path d="M28 2 A26 26 0 0 1 28 54 A13 13 0 0 1 28 28 A13 13 0 0 0 28 2Z" fill="rgba(124,58,237,.2)"/>
    <circle cx="28" cy="15" r="5" fill="rgba(124,58,237,.35)"/>
    <circle cx="28" cy="41" r="5" stroke="#7c3aed" stroke-width="1.5" fill="none"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="196" ry="156" fill="rgba(109,40,217,.04)"/>
</svg>

<div class="header">
  <div class="tag">사주 궁합 · 핵심</div>
  <div class="title">사주 궁합 볼 때<br><em>진짜 봐야 할 것 3가지</em></div>
</div>

<div class="cards">
  <div class="big-card">
    <span class="num-label">01</span>
    <span class="bc-title">상대방이 내 용신 오행을 가졌는가</span>
    <span class="bc-sub">옆에 있으면 컨디션이 좋아지는 사람 → 용신 오행일 확률이 높음. 가장 중요한 것</span>
  </div>
  <div class="big-card">
    <span class="num-label">02</span>
    <span class="bc-title">일지·월지의 합충 관계</span>
    <span class="bc-sub">일지끼리 합 → 체질적 궁합. 월지 충돌 → 생활 방식 갈등. 일상에서 실제로 체감됨</span>
  </div>
  <div class="big-card">
    <span class="num-label">03</span>
    <span class="bc-title">대운 흐름이 비슷한 시기인가</span>
    <span class="bc-sub">두 사람의 대운이 맞는 시기 = 같이 잘 풀리는 시기. 어긋나면 온도차가 생김 🙋</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월주 궁합이 중요한 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#160610 0%,#280818 55%,#0e0408 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.18;transform:scale(1.04);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;}
.tag{display:inline-block;background:rgba(244,63,94,.16);border:1px solid rgba(244,63,94,.32);color:#fda4af;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:36px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(244,63,94,.75),0 0 80px rgba(244,63,94,.28);}
.big-text em{color:#fb7185;font-style:normal;display:block;}
.phrases{display:flex;flex-direction:column;gap:13px;}
.phrase-block{border-left:3px solid rgba(244,63,94,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:14px;color:#ffe4e6;line-height:1.35;text-shadow:0 0 10px rgba(244,63,94,.4);}
.phrase-sub{font-size:10.5px;color:rgba(253,164,175,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#fda4af" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="116" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="288" cy="118" r="2" fill="#fb7185" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="324" cy="76" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="200" cy="30" r="1.5" fill="#fda4af" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="200" r="1" fill="#fff" style="--d:2.2s;--delay:1.3s;"/>
  <path class="moon" d="M322 28 Q344 18 338 48 Q332 68 315 58 Q330 44 322 28Z" fill="rgba(253,164,175,.28)"/>
  <!-- Two hearts deco -->
  <g class="deco" transform="translate(255,454)" opacity=".12">
    <path d="M18 28 Q18 18 10 18 Q2 18 2 26 Q2 34 18 44 Q34 34 34 26 Q34 18 26 18 Q18 18 18 28Z" stroke="#f43f5e" stroke-width="1.5" fill="rgba(244,63,94,.12)"/>
    <path d="M48 22 Q48 14 42 14 Q36 14 36 20 Q36 26 48 34 Q60 26 60 20 Q60 14 54 14 Q48 14 48 22Z" stroke="#fb7185" stroke-width="1.2" fill="rgba(251,113,133,.1)"/>
  </g>
  <ellipse class="deco" cx="180" cy="350" rx="200" ry="165" fill="rgba(159,18,57,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(244,63,94,.04)" font-family="serif">月</text>
</svg>

<div class="hero">
  <div class="tag">사주 궁합 · 월주</div>
  <div class="big-text">월주 궁합이<br><em>중요한</em><br>이유</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">월주 = 내 가치관·생활 방식</div>
      <div class="phrase-sub">일상에서 부딪히는 것들이 월주에서 나옴. 연애·동거에서 체감</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">일주가 맞아도 월주가 충돌하면?</div>
      <div class="phrase-sub">처음엔 좋지만 같이 살면서 생활 방식이 계속 충돌함</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">월주끼리 합이 있으면 찰떡</div>
      <div class="phrase-sub">취향·루틴·가치관이 자연스럽게 맞는 조합 🌹</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

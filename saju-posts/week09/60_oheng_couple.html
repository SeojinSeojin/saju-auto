<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오행이 서로 보완되는 커플 특징</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#040210 0%,#080320 55%,#020108 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.8;}}
@keyframes shimmer{0%,100%{opacity:.07;transform:scale(1);}50%{opacity:.17;transform:scale(1.03);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.2s ease-in-out infinite;}
.deco{animation:shimmer 5.8s ease-in-out infinite .8s;}
.header{position:relative;z-index:2;margin-bottom:4px;}
.tag{display:inline-block;background:rgba(139,92,246,.17);border:1px solid rgba(139,92,246,.34);color:#a78bfa;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:19px;line-height:1.35;color:#fff;text-shadow:0 0 24px rgba(139,92,246,.6);}
.title em{color:#a78bfa;font-style:normal;}
.items{flex:1;display:flex;flex-direction:column;gap:6px;position:relative;z-index:2;}
.item{display:flex;align-items:flex-start;gap:10px;border-radius:10px;padding:7px 11px;}
.item.mk{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.14);}
.item.hk{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.12);}
.item.tk{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.12);}
.item.gk{background:rgba(226,232,240,.05);border:1px solid rgba(226,232,240,.1);}
.item.sk{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.13);}
.item.zz{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.14);}
.num{font-family:'Jua',sans-serif;font-size:16px;min-width:24px;line-height:1;}
.num.mk{color:#34d399;text-shadow:0 0 8px rgba(16,185,129,.9);}
.num.hk{color:#f87171;text-shadow:0 0 8px rgba(239,68,68,.9);}
.num.tk{color:#fbbf24;text-shadow:0 0 8px rgba(245,158,11,.9);}
.num.gk{color:#e2e8f0;text-shadow:0 0 8px rgba(226,232,240,.7);}
.num.sk{color:#60a5fa;text-shadow:0 0 8px rgba(59,130,246,.9);}
.num.zz{color:#a78bfa;text-shadow:0 0 8px rgba(139,92,246,.9);}
.tx{display:flex;flex-direction:column;gap:1px;}
.it{font-size:12px;font-weight:700;color:#f8fafc;line-height:1.3;}
.id{font-size:10px;color:rgba(226,232,240,.58);line-height:1.4;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.18);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="42" cy="86" r="1.5" fill="#a78bfa" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="118" cy="44" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="280" cy="116" r="2" fill="#7c3aed" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="78" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="28" r="1.5" fill="#a78bfa" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="198" r="1" fill="#fff" style="--d:2.1s;--delay:1.2s;"/>
  <path class="moon" d="M325 28 Q347 18 341 48 Q335 68 318 58 Q333 44 325 28Z" fill="rgba(167,139,250,.25)"/>
  <!-- Five circles (오행) -->
  <g class="deco" transform="translate(252,455)" opacity=".12">
    <circle cx="10" cy="30" r="8" stroke="#10b981" stroke-width="1.5" fill="none"/>
    <circle cx="26" cy="16" r="8" stroke="#ef4444" stroke-width="1.5" fill="none"/>
    <circle cx="45" cy="16" r="8" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="30" r="8" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
    <circle cx="35" cy="44" r="8" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  </g>
  <ellipse class="deco" cx="180" cy="340" rx="196" ry="156" fill="rgba(67,20,217,.04)"/>
</svg>

<div class="header">
  <div class="tag">사주 궁합 · 오행</div>
  <div class="title">오행이 서로 <em>보완되는</em> 커플 특징</div>
</div>

<div class="items">
  <div class="item mk">
    <span class="num mk">목🌿</span>
    <div class="tx"><span class="it">목 부족한 사람 + 목 강한 상대</span><span class="id">상대 옆에서 성장 에너지·추진력이 충전됨</span></div>
  </div>
  <div class="item hk">
    <span class="num hk">화🔥</span>
    <div class="tx"><span class="it">화 부족한 사람 + 화 강한 상대</span><span class="id">함께 있으면 열정·활력이 살아나는 느낌</span></div>
  </div>
  <div class="item tk">
    <span class="num tk">토🏔️</span>
    <div class="tx"><span class="it">토 부족한 사람 + 토 강한 상대</span><span class="id">안정감·현실 감각이 보완되는 구조</span></div>
  </div>
  <div class="item gk">
    <span class="num gk">금💎</span>
    <div class="tx"><span class="it">금 부족한 사람 + 금 강한 상대</span><span class="id">결단력·명확한 기준이 채워짐</span></div>
  </div>
  <div class="item sk">
    <span class="num sk">수🌊</span>
    <div class="tx"><span class="it">수 부족한 사람 + 수 강한 상대</span><span class="id">지혜·유연성·깊이가 보완됨</span></div>
  </div>
  <div class="item zz">
    <span class="num zz">✨</span>
    <div class="tx"><span class="it">용신 오행 = 최고의 보완 조합</span><span class="id">상대가 내 용신 오행이면 옆에 있을수록 컨디션이 좋아짐 🙋</span></div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식신과 상관 — 같은 식상인데 왜 이렇게 다른가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#020c1c 0%,#081628 55%,#010a18 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:20px;}
.tag{display:inline-block;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:32px;line-height:1.2;color:#fff;text-shadow:0 0 35px rgba(59,130,246,.7),0 0 65px rgba(59,130,246,.25);}
.big-text em{color:#60a5fa;font-style:normal;}
.compare-blocks{display:flex;gap:10px;}
.cb{flex:1;border-radius:12px;padding:13px 11px;display:flex;flex-direction:column;gap:6px;}
.cb.ss{background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.2);}
.cb.sg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.18);}
.cb-title{font-family:'Jua',sans-serif;font-size:15px;font-weight:700;line-height:1;}
.cb-title.ss{color:#93c5fd;text-shadow:0 0 10px rgba(59,130,246,.5);}
.cb-title.sg{color:#fca5a5;text-shadow:0 0 10px rgba(239,68,68,.45);}
.cb-item{font-size:10.5px;color:rgba(220,235,255,.7);line-height:1.45;padding-left:8px;border-left:2px solid rgba(255,255,255,.1);}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="90" r="1.5" fill="#93c5fd" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="110" cy="46" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="116" r="2" fill="#93c5fd" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="318" cy="80" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="194" cy="30" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="56" cy="194" r="1" fill="#93c5fd" style="--d:2.1s;--delay:1.3s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M316 28 Q338 18 332 48 Q326 68 309 58 Q324 44 316 28Z" fill="rgba(147,197,253,.22)"/>
  <!-- Decoration: split yin-yang -->
  <g class="deco" transform="translate(254,454)" opacity=".12">
    <path d="M25 3 A22 22 0 0 1 25 47 Z" fill="rgba(96,165,250,.2)" stroke="#60a5fa" stroke-width="1"/>
    <path d="M25 3 A22 22 0 0 0 25 47 Z" fill="rgba(239,68,68,.15)" stroke="#ef4444" stroke-width="1"/>
    <circle cx="25" cy="3" r="2" fill="#60a5fa"/>
    <circle cx="25" cy="47" r="2" fill="#ef4444"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(30,64,175,.04)"/>
</svg>

<div class="hero">
  <div class="tag">十星 · 십성</div>
  <div class="big-text">같은 식상,<br><em>왜 이렇게</em><br>다른가</div>
  <div class="compare-blocks">
    <div class="cb ss">
      <div class="cb-title ss">🍚 식신</div>
      <div class="cb-item">여유롭고 느긋한 표현</div>
      <div class="cb-item">안전하고 지속가능한 방식</div>
      <div class="cb-item">먹고 즐기며 창조</div>
      <div class="cb-item">정관을 건드리지 않음</div>
      <div class="cb-item">장기적 돈복 구조</div>
    </div>
    <div class="cb sg">
      <div class="cb-title sg">⚡ 상관</div>
      <div class="cb-item">날카롭고 직설적 표현</div>
      <div class="cb-item">파격적이고 혁신적 방식</div>
      <div class="cb-item">도전하며 창조</div>
      <div class="cb-item">정관을 깨부숨</div>
      <div class="cb-item">폭발적 기회 but 불안정</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

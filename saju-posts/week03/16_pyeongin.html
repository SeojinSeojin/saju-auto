<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편인 있는 사람의 뇌구조</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(145deg,#020c1c 0%,#091828 55%,#010a18 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:22px;}
.tag{display:inline-block;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:36px;line-height:1.2;color:#fff;text-shadow:0 0 38px rgba(59,130,246,.7),0 0 70px rgba(59,130,246,.25);}
.big-text em{color:#60a5fa;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:13px;}
.phrase-block{border-left:3px solid rgba(59,130,246,.5);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:15.5px;color:#dbeafe;line-height:1.35;text-shadow:0 0 12px rgba(59,130,246,.4);}
.phrase-sub{font-size:11px;color:rgba(147,197,253,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="36" cy="92" r="1.5" fill="#93c5fd" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="112" cy="48" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="284" cy="118" r="2" fill="#93c5fd" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="320" cy="80" r="1" fill="#fff" style="--d:2s;--delay:.3s;"/>
  <circle class="star" cx="198" cy="32" r="1.5" fill="#fff" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="58" cy="198" r="1" fill="#93c5fd" style="--d:2.2s;--delay:1.4s;"/>
  <circle class="star" cx="326" cy="308" r="1.5" fill="#fff" style="--d:2.7s;--delay:.5s;"/>
  <!-- Crescent moon -->
  <path class="moon" d="M318 28 Q340 18 334 48 Q328 68 311 58 Q326 44 318 28Z" fill="rgba(147,197,253,.22)"/>
  <!-- Decoration: brain waves -->
  <g class="deco" transform="translate(250,455)" opacity=".12">
    <path d="M5 25 Q15 10 25 25 Q35 40 45 25 Q55 10 65 25" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M0 35 Q12 22 24 35 Q36 48 48 35" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" opacity=".5"/>
  </g>
  <ellipse class="deco" cx="180" cy="355" rx="198" ry="158" fill="rgba(30,64,175,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="105" fill="rgba(59,130,246,.04)" font-family="serif">偏</text>
</svg>

<div class="hero">
  <div class="tag">十星 · 십성</div>
  <div class="big-text"><em>편인</em> 있는<br>사람의<br>뇌구조</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">꽂히면 밤새 파고듦</div>
      <div class="phrase-sub">관심 없으면 완전 무관심. 극과 극이 공존</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">독학·비주류·나만의 공부법</div>
      <div class="phrase-sub">정통 방식보다 자기만의 루트로 배움. 본인도 인정</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">시작은 잘하는데 마무리가…</div>
      <div class="phrase-sub">도식(倒食) — 식신을 극함. 시작 에너지 넘침, 완성이 약함 🙋</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

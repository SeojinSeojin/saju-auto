<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비견 많은 사주 — 동업하면 안 되는 이유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#010c14 0%,#041822 55%,#010a12 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.4s ease-in-out infinite;}
.deco{animation:shimmer 6.8s ease-in-out infinite .9s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#67e8f9;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:19px;line-height:1.4;color:#fff;text-shadow:0 0 22px rgba(6,182,212,.6);}
.title em{color:#22d3ee;font-style:normal;}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative;z-index:2;}
.gitem{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.15);border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;box-shadow:0 0 14px rgba(6,182,212,.08);}
.gicon{font-size:22px;line-height:1;}
.git{font-size:11.5px;font-weight:700;color:#cffafe;line-height:1.35;}
.gid{font-size:10px;color:rgba(103,232,249,.62);line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="88" r="1.5" fill="#67e8f9" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="112" cy="44" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="116" r="2" fill="#22d3ee" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="28" r="1.5" fill="#67e8f9" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="196" r="1" fill="#fff" style="--d:2.1s;--delay:1.3s;"/>
  <path class="moon" d="M318 28 Q340 18 334 48 Q328 68 311 58 Q326 44 318 28Z" fill="rgba(103,232,249,.22)"/>
  <!-- Two equal circles (비견 = equal shoulder) -->
  <g class="deco" transform="translate(258,456)" opacity=".12">
    <circle cx="18" cy="25" r="16" stroke="#06b6d4" stroke-width="2" fill="none"/>
    <circle cx="38" cy="25" r="16" stroke="#06b6d4" stroke-width="2" fill="none"/>
    <line x1="18" y1="9" x2="38" y2="9" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="196" ry="156" fill="rgba(8,145,178,.04)"/>
</svg>

<div class="header">
  <div class="tag">十星 · 비견</div>
  <div class="title"><em>비견 많은 사주</em><br>동업하면 안 되는 이유</div>
</div>

<div class="grid">
  <div class="gitem">
    <span class="gicon">👑</span>
    <span class="git">자아가 강해 리더를 인정 못 함</span>
    <span class="gid">파트너도 나만큼 강한 자아 → 결국 주도권 싸움</span>
  </div>
  <div class="gitem">
    <span class="gicon">💰</span>
    <span class="git">재성이 분산되는 구조</span>
    <span class="gid">비견이 정재를 빼앗는 패턴. 수익이 나눠지며 불만 증가</span>
  </div>
  <div class="gitem">
    <span class="gicon">🗣️</span>
    <span class="git">방식 차이로 갈등이 잦음</span>
    <span class="gid">내 방식이 맞다는 확신이 강해 타협이 어려움</span>
  </div>
  <div class="gitem">
    <span class="gicon">🚪</span>
    <span class="git">독립·단독 사업이 진짜 정답</span>
    <span class="gid">혼자 결정하고 혼자 책임지는 구조에서 빛남</span>
  </div>
  <div class="gitem">
    <span class="gicon">🤝</span>
    <span class="git">만약 동업한다면?</span>
    <span class="gid">역할을 명확하게 분리. 수익 배분 계약 필수 🙋</span>
  </div>
  <div class="gitem">
    <span class="gicon">⚡</span>
    <span class="git">경쟁자가 있을 때 폭발</span>
    <span class="gid">라이벌 있으면 오히려 능력이 극대화되는 구조</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

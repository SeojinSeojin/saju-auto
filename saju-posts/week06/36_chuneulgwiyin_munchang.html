<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>천을귀인 + 문창귀인 동시에 있으면 생기는 일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#0b0222 0%,#1a0438 55%,#070b28 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.12;}50%{opacity:.82;}}
@keyframes shimmer{0%,100%{opacity:.06;transform:scale(1);}50%{opacity:.18;transform:scale(1.04);}}
.card{width:360px;height:640px;padding:64px 24px 84px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.5s ease-in-out infinite;}
.deco{animation:shimmer 7s ease-in-out infinite 1s;}
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:20px;}
.tag{display:inline-block;background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.38);color:#c084fc;font-size:10px;padding:2px 10px;border-radius:20px;letter-spacing:.5px;align-self:flex-start;}
.big-text{font-family:'Jua',sans-serif;font-size:34px;line-height:1.2;color:#fff;text-shadow:0 0 40px rgba(168,85,247,.8),0 0 80px rgba(168,85,247,.3);}
.big-text em{color:#c084fc;font-style:normal;}
.phrases{display:flex;flex-direction:column;gap:12px;}
.phrase-block{border-left:3px solid rgba(168,85,247,.55);padding-left:14px;}
.phrase{font-family:'Jua',sans-serif;font-size:14px;color:#ede9fe;line-height:1.35;text-shadow:0 0 10px rgba(168,85,247,.4);}
.phrase-sub{font-size:10.5px;color:rgba(196,181,253,.58);margin-top:3px;line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="40" cy="88" r="1.5" fill="#c084fc" style="--d:2.4s;--delay:.1s;"/>
  <circle class="star" cx="116" cy="44" r="1" fill="#fff" style="--d:3.2s;--delay:.6s;"/>
  <circle class="star" cx="288" cy="118" r="2" fill="#c084fc" style="--d:2.6s;--delay:1.1s;"/>
  <circle class="star" cx="324" cy="76" r="1" fill="#fff" style="--d:2s;--delay:.4s;"/>
  <circle class="star" cx="200" cy="30" r="1.5" fill="#fff" style="--d:3.4s;--delay:.9s;"/>
  <circle class="star" cx="60" cy="200" r="1" fill="#c084fc" style="--d:2.2s;--delay:1.3s;"/>
  <circle class="star" cx="160" cy="560" r="1" fill="#a78bfa" style="--d:2.8s;--delay:.5s;"/>
  <path class="moon" d="M322 28 Q344 18 338 48 Q332 68 315 58 Q330 44 322 28Z" fill="rgba(192,132,252,.35)"/>
  <!-- Two stars joined (double gwiin) -->
  <g class="deco" transform="translate(255,452)" opacity=".13">
    <polygon points="22,2 26,14 40,14 29,22 33,36 22,28 11,36 15,22 4,14 18,14" stroke="#c084fc" stroke-width="1.5" fill="rgba(192,132,252,.12)"/>
    <polygon points="52,6 55,16 65,16 57,22 60,32 52,26 44,32 47,22 39,16 49,16" stroke="#a78bfa" stroke-width="1.2" fill="rgba(167,139,250,.1)"/>
  </g>
  <ellipse class="deco" cx="180" cy="350" rx="200" ry="165" fill="rgba(124,58,237,.04)"/>
  <text x="180" y="510" text-anchor="middle" font-size="110" fill="rgba(168,85,247,.04)" font-family="serif">貴</text>
</svg>

<div class="hero">
  <div class="tag">貴人 · 귀인 복합</div>
  <div class="big-text">두 귀인이<br><em>동시에</em><br>있으면</div>
  <div class="phrases">
    <div class="phrase-block">
      <div class="phrase">천을귀인 = 사람이 나를 살린다</div>
      <div class="phrase-sub">위기 때 반드시 귀인이 나타나 길을 열어줌</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">문창귀인 = 지식이 무기가 된다</div>
      <div class="phrase-sub">배움이 빠르고 글·논문·시험에서 두각을 나타냄</div>
    </div>
    <div class="phrase-block">
      <div class="phrase">둘 다 있으면? 사람 + 능력 모두</div>
      <div class="phrase-sub">귀인이 내 실력을 알아봐 주는 구조. 멘토·추천·입소문으로 기회가 열림 🌟</div>
    </div>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>

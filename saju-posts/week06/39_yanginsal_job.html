<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양인살 있는 사람 직업 궁합 총정리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:360px;height:640px;overflow:hidden;background:linear-gradient(148deg,#020c1c 0%,#041828 55%,#010a18 100%);font-family:'Noto Sans KR',sans-serif;color:#fff;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.78;}}
@keyframes shimmer{0%,100%{opacity:.06;}50%{opacity:.17;}}
.card{width:360px;height:640px;padding:62px 22px 82px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
.bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.star{animation:twinkle var(--d,2.5s) infinite var(--delay,0s);}
.moon{animation:shimmer 4.4s ease-in-out infinite;}
.deco{animation:shimmer 6.8s ease-in-out infinite .9s;}
.header{position:relative;z-index:2;margin-bottom:2px;}
.tag{display:inline-block;background:rgba(20,184,166,.16);border:1px solid rgba(20,184,166,.32);color:#5eead4;font-size:10px;padding:2px 10px;border-radius:20px;margin-bottom:7px;letter-spacing:.5px;}
.title{font-family:'Jua',sans-serif;font-size:19px;line-height:1.4;color:#fff;text-shadow:0 0 22px rgba(20,184,166,.6);}
.title em{color:#2dd4bf;font-style:normal;}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative;z-index:2;}
.gitem{background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.16);border-radius:12px;padding:12px 11px;display:flex;flex-direction:column;gap:5px;box-shadow:0 0 16px rgba(20,184,166,.09);}
.gicon{font-size:22px;line-height:1;}
.git{font-size:11.5px;font-weight:700;color:#ccfbf1;line-height:1.35;}
.gid{font-size:10px;color:rgba(94,234,212,.62);line-height:1.5;}
.footer{position:absolute;bottom:18px;right:18px;font-size:9.5px;color:rgba(255,255,255,.17);letter-spacing:1px;z-index:2;}
</style>
</head>
<body>
<div class="card">
<svg class="bg" viewBox="0 0 360 640" fill="none">
  <circle class="star" cx="38" cy="90" r="1.5" fill="#5eead4" style="--d:2.3s;--delay:0s;"/>
  <circle class="star" cx="112" cy="46" r="1" fill="#fff" style="--d:3.1s;--delay:.5s;"/>
  <circle class="star" cx="282" cy="118" r="2" fill="#5eead4" style="--d:2.7s;--delay:1s;"/>
  <circle class="star" cx="320" cy="76" r="1" fill="#fff" style="--d:1.9s;--delay:.3s;"/>
  <circle class="star" cx="196" cy="30" r="1.5" fill="#fff" style="--d:3.5s;--delay:.8s;"/>
  <circle class="star" cx="58" cy="196" r="1" fill="#5eead4" style="--d:2.1s;--delay:1.3s;"/>
  <path class="moon" d="M318 30 Q340 20 334 50 Q328 70 311 60 Q326 46 318 30Z" fill="rgba(94,234,212,.24)"/>
  <!-- Sword deco (양인 = blade) -->
  <g class="deco" transform="translate(264,452)" opacity=".13">
    <line x1="28" y1="0" x2="28" y2="50" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M18 12 L28 0 L38 12" stroke="#14b8a6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="20" y="48" width="16" height="6" rx="2" stroke="#14b8a6" stroke-width="1.5" fill="none"/>
    <line x1="14" y1="36" x2="42" y2="36" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse class="deco" cx="180" cy="345" rx="196" ry="156" fill="rgba(13,148,136,.04)"/>
</svg>

<div class="header">
  <div class="tag">神煞 · 양인</div>
  <div class="title"><em>양인살</em> 있는 사람<br>직업 궁합 총정리</div>
</div>

<div class="grid">
  <div class="gitem">
    <span class="gicon">⚔️</span>
    <span class="git">군인·경찰·소방관</span>
    <span class="gid">강인한 에너지를 제도 안에서 발휘. 최강 적성</span>
  </div>
  <div class="gitem">
    <span class="gicon">🩺</span>
    <span class="git">외과의·응급의학</span>
    <span class="gid">절단·절개 에너지. 위기 상황에서 오히려 안정됨</span>
  </div>
  <div class="gitem">
    <span class="gicon">🥊</span>
    <span class="git">격투기·스포츠 선수</span>
    <span class="gid">신체 에너지를 극한까지 쓰는 분야. 천직</span>
  </div>
  <div class="gitem">
    <span class="gicon">⚖️</span>
    <span class="git">검사·변호사</span>
    <span class="gid">날카로운 논리로 상대를 제압. 편관과 시너지</span>
  </div>
  <div class="gitem">
    <span class="gicon">🔧</span>
    <span class="git">엔지니어·기술직</span>
    <span class="gid">정밀함과 강한 집중력. 뚝심이 강점</span>
  </div>
  <div class="gitem">
    <span class="gicon">🚫</span>
    <span class="git">동업·감정 서비스업</span>
    <span class="gid">자기 주도성 강해 충돌 위험. 혼자 하는 구조 추천 🙋</span>
  </div>
</div>

<div class="footer">@saju.card</div>
</div>
</body>
</html>
